<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Register</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="register-container">
  <h2>Înregistrare</h2>
  <form th:action="@{/register}" method="post">
    <div>
      <label for="username">Username:</label>
      <input type="text" id="username" name="username" required>
    </div>
    <div>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div>
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required>
    </div>
    <div>
      <label for="confirmPassword">Confirm Password:</label>
      <input type="password" id="confirmPassword" name="confirmPassword" required>
    </div>
    <div>
      <label for="nume">Nume:</label>
      <input type="text" id="nume" name="nume" required>
    </div>
    <div>
      <label for="prenume">Prenume:</label>
      <input type="text" id="prenume" name="prenume" required>
    </div>
    <div>
      <label for="cnp">CNP:</label>
      <input type="text" id="cnp" name="cnp" required>
    </div>
    <div>
      <label for="dataNasterii">Data Nașterii:</label>
      <input type="date" id="dataNasterii" name="dataNasterii" required>
    </div>
    <div>
      <label for="sex">Sex:</label>
      <select id="sex" name="sex" required>
        <option value="M">M</option>
        <option value="F">F</option>
      </select>
    </div>
    <div>
      <label for="telefon">Telefon:</label>
      <input type="text" id="telefon" name="telefon" required>
    </div>
    <div>
      <label for="adresa">Adresa:</label>
      <input type="text" id="adresa" name="adresa" required>
    </div>
    <div>
      <label for="alergii">Alergii:</label>
      <input type="text" id="alergii" name="alergii">
    </div>
    <div>
      <label for="grupaSange">Grupa Sânge:</label>
      <input type="text" id="grupaSange" name="grupaSange">
    </div>
    <div>
      <label for="greutate">Greutate:</label>
      <input type="number" id="greutate" name="greutate" step="0.01">
    </div>
    <div>
      <label for="inaltime">Înălțime:</label>
      <input type="number" id="inaltime" name="inaltime" step="0.01">
    </div>

    <div>
      <button type="submit">Register</button>
    </div>
  </form>
  <p>Ai deja un cont? <a th:href="@{/login}">Loghează-te aici</a></p>
</div>
</body>
</html>
